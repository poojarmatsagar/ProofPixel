<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact | ProofPixel</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<!-- Navbar -->
<nav class="navbar">
    <div class="logo">
        <div class="logo-icon">PP</div>
        <div>
            <h3>ProofPixel</h3>

        </div>
    </div>

      <ul class="nav-links">
        <li><a href="/">Home</a></li>
        <li><a href="/about">About Us</a></li>

        <li><a href="/contact">Contact Us</a></li>

    </ul>
</nav>


<div class="contact-container">
    <div class="contact-card">
        <h2>Contact</h2>
        <p>Have questions about ProofPixel? We're here to help.</p><br>

        <form action="https://formsubmit.co/proofpixelteam@gmail.com" method="POST">


            <input type="hidden" name="_next" value="http://localhost:5000/contact">

            <div class="input-group">
                <label>Full Name</label>
                <input type="text" name="name" required>

            </div>

            <div class="input-group">
                <label>Email Address</label>
                <input type="email" name="email" required>

            </div>


            <div class="input-group">
                <label>Your Query</label>
                <textarea name="message" rows="4" required></textarea>

            </div>

            <button type="submit">Send Message</button>

        </form>
    </div>
</div>




<!-- Chatbot Button -->
<div class="chatbot-widget">
    <div class="chatbot-btn" onclick="toggleChat()">
       <img src="{{ url_for('static', filename='bot.jpeg') }}">
    </div>

    <!-- Chat Box -->
    <div class="chat-box" id="chatBox">
        <div class="chat-header">
            <span>ProofPixel AI</span>
            <button onclick="toggleChat()">✖</button>
        </div>

        <div class="chat-body" id="chatBody">
            <div class="bot-msg">Hello! How can I help you?</div>
        </div>

        <div class="chat-footer">
            <input type="text" id="userInput" placeholder="Type message...">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>
 </div>




<script>
function toggleChat(){
    let box = document.getElementById("chatBox");

    box.style.display =
    box.style.display === "flex" ? "none" : "flex";
}

async function sendMessage(){

    let input = document.getElementById("userInput");
    let msg = input.value.trim();

    if(msg === "") return;

    let body = document.getElementById("chatBody");

    /* Show User Message */
    body.innerHTML += `
        <div class="user-msg">${msg}</div>
    `;

    input.value = "";

    /* Typing message */
    body.innerHTML += `
        <div class="bot-msg" id="typing">Typing...</div>
    `;

    body.scrollTop = body.scrollHeight;

    try{

        const response = await fetch("/chat", {
            method: "POST",
            headers: {
                "Content-Type":
                "application/x-www-form-urlencoded"
            },
            body: "message=" +
            encodeURIComponent(msg)
        });

        const data = await response.json();

        document.getElementById("typing").remove();

        body.innerHTML += `
            <div class="bot-msg">${data.reply}</div>
        `;

        body.scrollTop = body.scrollHeight;

    } catch(error){

        document.getElementById("typing").remove();

        body.innerHTML += `
            <div class="bot-msg">
            Error connecting chatbot.
            </div>
        `;
    }
}

</script>
</body>
</html>
